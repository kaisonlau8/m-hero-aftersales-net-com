<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>猛士汽车售后无忧服务体系</title>
  <style>
    :root {
      --red-950: #00222b;
      --red-900: #003544;
      --red-850: #00455a;
      --red-800: #005468;
      --red-700: #00647d;
      --red-500: #006f86;
      --gold: #7fd4c5;
      --text: #f0fbf8;
      --muted: #a8d4cc;
      --line: rgba(220, 255, 248, 0.16);
      --panel: rgba(255, 255, 255, 0.055);
      --panel-strong: rgba(255, 255, 255, 0.105);
      font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif;
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      color: var(--text);
      background:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(0, 111, 134, 0.55), transparent 60%),
        radial-gradient(ellipse 60% 40% at 85% 8%, rgba(0, 180, 166, 0.18), transparent 55%),
        radial-gradient(ellipse 50% 35% at 10% 15%, rgba(0, 100, 125, 0.22), transparent 50%),
        linear-gradient(180deg, #001a22 0%, #002836 35%, #00131a 100%);
      min-height: 100vh;
      background-attachment: fixed;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 0%, rgba(127, 212, 197, 0.06), transparent 40%),
        repeating-linear-gradient(90deg, rgba(255,255,255,0.018) 0 1px, transparent 1px 120px),
        repeating-linear-gradient(0deg, rgba(255,255,255,0.012) 0 1px, transparent 1px 120px);
      opacity: 0.6;
    }

    .page {
      width: min(1440px, 100%);
      margin: 0 auto;
      padding: 40px clamp(18px, 4vw, 56px) 64px;
      position: relative;
    }

    .hero {
      min-height: 42vh;
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 36px;
      align-items: end;
      padding: 34px 0 46px;
      border-bottom: 1px solid var(--line);
    }

    .hero::before,
    .hero::after {
      content: "";
      position: absolute;
      top: 36px;
      height: 2px;
      width: min(34vw, 440px);
      background: linear-gradient(90deg, transparent, rgba(127, 212, 197, 0.7), transparent);
      filter: blur(1px);
    }

    .hero::before { left: 7%; transform: skewY(-5deg); }
    .hero::after { right: 7%; transform: skewY(5deg); }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--gold);
      font-size: 14px;
      letter-spacing: 0;
      margin-bottom: 18px;
      font-weight: 700;
    }

    .eyebrow::before,
    .eyebrow::after {
      content: "";
      display: block;
      width: 44px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold));
    }

    .eyebrow::after {
      background: linear-gradient(90deg, var(--gold), transparent);
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 5vw, 52px);
      line-height: 0.98;
      letter-spacing: 0;
      max-width: 820px;
      text-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }

    .hero-copy {
      margin: 22px 0 0;
      max-width: 860px;
      color: var(--muted);
      font-size: clamp(16px, 2vw, 21px);
      line-height: 1.75;
    }

    .service-story {
      padding: 34px 0 32px;
      border-bottom: 1px solid var(--line);
    }

    .story-inner {
      width: 100%;
      margin: 0 auto;
      border: 1px solid var(--line);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.11), rgba(255,255,255,0.045)),
        radial-gradient(circle at 18% 0%, rgba(231,192,107,0.18), transparent 22rem);
      box-shadow: 0 24px 70px rgba(0,0,0,0.28);
      backdrop-filter: blur(10px);
      border-radius: 8px;
      padding: clamp(22px, 4vw, 44px);
    }

    .story-kicker {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--gold);
      font-size: 13px;
      font-weight: 800;
      margin-bottom: 14px;
    }

    .story-kicker::before {
      content: "";
      width: 36px;
      height: 1px;
      background: var(--gold);
    }

    .story-inner h2 {
      margin: 0;
      font-size: clamp(28px, 4vw, 44px);
      line-height: 1.18;
    }

    .story-lead {
      margin: 18px 0 0;
      color: #d8fff5;
      font-size: clamp(17px, 2vw, 22px);
      line-height: 1.9;
      font-weight: 500;
    }

    .story-lead strong,
    .service-item strong {
      color: var(--gold);
      font-weight: 900;
    }

    .service-list {
      display: grid;
      gap: 14px;
      margin-top: 26px;
    }

    .service-item {
      display: grid;
      grid-template-columns: 54px minmax(0, 1fr);
      gap: 16px;
      padding: 18px;
      border: 1px solid rgba(231,192,107,0.22);
      background: rgba(0,0,0,0.18);
      border-radius: 8px;
    }

    .service-no {
      display: grid;
      place-items: center;
      width: 54px;
      height: 54px;
      border-radius: 50%;
      color: #fff;
      font-size: 20px;
      font-weight: 900;
      background: radial-gradient(circle, var(--red-500), var(--red-800));
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.18);
    }

    .service-item h3 {
      margin: 0 0 8px;
      font-size: clamp(19px, 2vw, 24px);
      line-height: 1.3;
    }

    .service-item p {
      margin: 0;
      color: rgba(255,247,238,0.84);
      font-size: 15px;
      line-height: 1.85;
    }

    .story-closing {
      margin: 24px 0 0;
      padding-top: 18px;
      border-top: 1px solid rgba(255,255,255,0.12);
      color: var(--muted);
      font-size: 14px;
      line-height: 1.8;
      text-align: center;
    }

    .coverage-claim {
      padding: 18px 0 34px;
      border-bottom: 1px solid var(--line);
    }

    .coverage-inner {
      width: 100%;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .claim-card {
      border: 1px solid rgba(231,192,107,0.24);
      background:
        linear-gradient(135deg, rgba(231,192,107,0.12), rgba(255,255,255,0.045)),
        rgba(0,0,0,0.18);
      border-radius: 8px;
      padding: 20px;
      min-height: 146px;
    }

    .claim-card span {
      color: var(--gold);
      font-size: 13px;
      font-weight: 900;
    }

    .claim-card p {
      margin: 10px 0 0;
      color: #e0fff8;
      font-size: clamp(17px, 2vw, 22px);
      line-height: 1.65;
      font-weight: 800;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .stat-card,
    .summary-panel,
    .region-section,
    .city-block {
      border: 1px solid var(--line);
      background: linear-gradient(180deg, var(--panel-strong), var(--panel));
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.24);
      backdrop-filter: blur(10px);
      border-radius: 8px;
    }

    .stat-card {
      padding: 18px 18px 16px;
      min-height: 128px;
    }

    .stat-label,
    .stat-note {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .stat-value {
      font-size: clamp(38px, 6vw, 64px);
      line-height: 1;
      font-weight: 800;
      margin: 12px 0 8px;
      color: #ffffff;
    }

    .summary {
      display: grid;
      grid-template-columns: minmax(280px, 0.85fr) minmax(320px, 1.15fr);
      gap: 20px;
      padding: 30px 0;
    }

    .summary-panel {
      padding: 22px;
    }

    .panel-title {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 16px;
      margin-bottom: 18px;
    }

    .panel-title h2 {
      margin: 0;
      font-size: 22px;
    }

    .panel-title span {
      color: var(--gold);
      font-size: 13px;
      white-space: nowrap;
    }

    .bar-row {
      display: grid;
      grid-template-columns: 72px minmax(0, 1fr) 42px;
      gap: 12px;
      align-items: center;
      padding: 9px 0;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .bar-row:last-child { border-bottom: 0; }
    .bar-title { color: #fff; font-size: 14px; }
    .bar-count { text-align: right; color: var(--gold); font-weight: 800; }
    .bar-track { height: 9px; background: rgba(255,255,255,0.12); overflow: hidden; border-radius: 999px; }
    .bar-track span { display: block; height: 100%; background: linear-gradient(90deg, var(--gold), var(--red-500)); border-radius: inherit; }

    .top-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px 14px;
    }

    .top-list li {
      display: grid;
      grid-template-columns: 38px minmax(0, 1fr) 34px;
      gap: 10px;
      align-items: center;
      padding: 10px 12px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(0,0,0,0.14);
      border-radius: 7px;
    }

    .rank { color: var(--gold); font-size: 12px; font-weight: 800; }
    .district-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #d8fff5; }
    .top-list strong { color: #fff; text-align: right; font-size: 18px; }

    .layout {
      display: grid;
      grid-template-columns: 220px minmax(0, 1fr);
      gap: 24px;
      align-items: start;
      padding-top: 34px;
    }

    .side-nav {
      position: sticky;
      top: 18px;
      display: grid;
      gap: 8px;
      padding: 14px;
      border: 1px solid var(--line);
      background: rgba(0,0,0,0.2);
      border-radius: 8px;
    }

    .side-nav a {
      color: var(--text);
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 11px 12px;
      border-radius: 7px;
      background: rgba(255,255,255,0.055);
      transition: background 150ms ease, transform 150ms ease;
    }

    .side-nav a:hover {
      background: rgba(127, 212, 197, 0.16);
      transform: translateX(2px);
    }

    .side-nav strong {
      color: var(--gold);
    }

    .regions {
      display: grid;
      gap: 22px;
    }

    .region-section {
      padding: clamp(18px, 3vw, 30px);
      scroll-margin-top: 24px;
    }

    .region-heading {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 24px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 18px;
      margin-bottom: 22px;
    }

    .region-heading p {
      margin: 0 0 4px;
      color: var(--gold);
      font-size: 13px;
      font-weight: 700;
    }

    .region-heading h2 {
      margin: 0;
      font-size: clamp(28px, 4vw, 44px);
    }

    .region-heading strong {
      display: grid;
      place-items: center;
      min-width: 82px;
      height: 82px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--red-500), var(--red-800));
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.18), 0 12px 28px rgba(0,0,0,0.28);
      font-size: 34px;
    }

    .province-block + .province-block {
      margin-top: 26px;
    }

    .province-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 14px;
    }

    .province-title h3 {
      margin: 0;
      font-size: 23px;
    }

    .province-title span {
      color: var(--gold);
      font-weight: 800;
    }

    .city-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .city-block {
      padding: 16px;
      background: rgba(0,0,0,0.18);
      box-shadow: none;
    }

    .city-block header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .city-block h4 {
      margin: 0;
      font-size: 19px;
    }

    .city-block p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .city-block header strong {
      color: #fff;
      font-size: 30px;
      line-height: 1;
    }

    .district-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }

    .district-pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 7px 9px;
      border: 1px solid rgba(231,192,107,0.32);
      background: rgba(231,192,107,0.08);
      border-radius: 999px;
      color: #e8fff9;
      font-size: 13px;
      max-width: 100%;
    }

    .district-pill strong {
      color: var(--gold);
      font-size: 13px;
    }

    .store-list {
      list-style: none;
      margin: 0;
      padding: 10px 0 0;
      border-top: 1px solid rgba(255,255,255,0.08);
      display: grid;
      gap: 7px;
    }

    .store-list li {
      display: grid;
      grid-template-columns: 78px minmax(0, 1fr);
      gap: 10px;
      color: rgba(255,255,255,0.82);
      font-size: 13px;
      line-height: 1.45;
    }

    .store-list li span {
      color: var(--gold);
      overflow-wrap: anywhere;
    }

    footer {
      padding: 42px 0 0;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }

    @media (max-width: 1020px) {
      .hero,
      .summary,
      .layout {
        grid-template-columns: 1fr;
      }
      .hero { min-height: auto; align-items: start; }
      .side-nav { position: static; grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .city-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 680px) {
      .page { padding: 24px 14px 44px; }
      .hero { gap: 26px; padding-bottom: 30px; }
      .top-list,
      .side-nav {
        grid-template-columns: 1fr;
      }
      .service-item {
        grid-template-columns: 1fr;
      }
      .coverage-inner {
        grid-template-columns: 1fr;
      }
      .region-heading strong {
        min-width: 64px;
        height: 64px;
        font-size: 28px;
      }
      .store-list li { grid-template-columns: 64px minmax(0, 1fr); }
    }

    @media print {
      body { background: #3e0108; }
      .side-nav { display: none; }
      .layout { grid-template-columns: 1fr; }
      .region-section { break-inside: avoid; }
    }
  

    .loading-line {
      color: var(--gold);
      font-size: 14px;
      margin-top: 14px;
      min-height: 22px;
    }

    .error-panel {
      border: 1px solid rgba(255, 80, 80, 0.35);
      background: rgba(160, 20, 20, 0.2);
      padding: 18px;
      border-radius: 8px;
      line-height: 1.7;
    }

    .service-note {
      padding: 16px 0 0;
    }

    .service-note .story-inner {
      text-align: center;
      padding: clamp(20px, 3vw, 32px);
    }

    .service-note .story-lead {
      margin: 0;
      color: var(--muted);
      font-size: 17px;
      line-height: 2.1;
      font-weight: 400;
      max-width: 960px;
      margin: 0 auto;
    }
</style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <div>
        <div class="eyebrow">M-HERO SERVICE NETWORK</div>
      <h1>猛士汽车售后服务网点说明</h1>
      </div>
    </section>

    <section class="coverage-claim" aria-label="售后服务网络覆盖">
      <div class="coverage-inner">
        <article class="claim-card">
          <span>NETWORK COVERAGE</span>
          <p>猛士汽车售后服务网络已实现中国大陆一线及新一线城市覆盖率100%，核心城市服务触点持续加密。</p>
        </article>
        <article class="claim-card">
          <span>SERVICE REACH</span>
          <p>一线、新一线及二线重点城市，服务网络覆盖率90%。</p>
        </article>
      </div>
    </section>

    <section class="layout">
      <nav class="side-nav" id="sideNav" aria-label="区域导航"></nav>
      <div class="regions" id="regions"></div>
    </section>

    <section class="service-note">
      <div class="story-inner">
        <p class="story-lead">随着猛士汽车售后服务网点的增加，猛士汽车还提供更贴心和便利的售后服务：城区内，用户可通过 APP 一键发起<strong>取送车服务</strong>，专业团队上门交接，单程覆盖范围可达 50KM；城区之外，猛士汽车还提供硬核的<strong>全域道路救援服务</strong>，用户服务中心 24 小时在线，救援网络覆盖全国主要区域，一个电话，安心必达。</p>
      </div>
    </section>

  </main>
  <script src="vendor/xlsx.full.min.js"></script>
  <script src="app.js" data-excel-url="./售后网络.xlsx"></script>
</body>
</html>
